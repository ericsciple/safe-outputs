name: "Setup safe-outputs"
description: >-
  Install the safe-outputs CLI on the runner PATH so it can be referenced as an MCP
  server (e.g. command: safe-outputs) by a sandbox/harness such as microvm-agent.
author: "ericsciple"

runs:
  using: "composite"
  steps:
    - name: Install safe-outputs CLI
      shell: bash
      run: |
        set -e
        # The whole repo is checked out at the `@ref` used in `uses:`. GITHUB_ACTION_PATH
        # points at this setup/ dir, so the CLI package is its parent — install from disk,
        # no re-download, and the version always matches the ref you pinned.
        root="$(cd "$GITHUB_ACTION_PATH/.." && pwd)"
        echo "Installing safe-outputs from ${root}"
        npm install -g "$root"
        # Ensure npm's global bin is on PATH for later steps (usually already is).
        globalbin="$(npm prefix -g)/bin"
        echo "$globalbin" >> "$GITHUB_PATH"
        export PATH="$globalbin:$PATH"
        safe-outputs --help >/dev/null 2>&1 || true
        echo "safe-outputs installed at: $(command -v safe-outputs || echo "$globalbin/safe-outputs")"
