name: "Setup safe-outputs"
description: >-
  Put the safe-outputs CLI on the runner PATH (job-scoped) so it can be referenced as
  an MCP server (e.g. command: safe-outputs) by a sandbox/harness such as microvm-agent.
author: "ericsciple"

# A Node.js action (not composite) on purpose: it gives us process.execPath — the
# runner's own Node from externals — which we bake into the CLI wrapper. That way the
# wrapper never assumes `node` is on PATH (a workflow without setup-node has no `node`
# on PATH), and we avoid a global `npm install -g` that would leak across jobs on
# self-hosted runners. Bundled with ncc (dist/index.js) so @actions/core ships with it;
# rebuild with `npm run build` after changing setup/index.js.
runs:
  using: "node20"
  main: "dist/index.js"
